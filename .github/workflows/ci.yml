name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # `aiohttp` covers the longctx proxy path that response_rewriter
          # tests exercise (the v0.5.3 inner-import fix made this no longer
          # mandatory, but installing it in CI lets the proxy code branches
          # actually run under coverage).
          pip install pytest pytest-cov ruff psutil numpy aiohttp
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # vllm declared as runtime dep in v0.5.2; install here so the
          # platform plugin + worker + executor branches in
          # response_rewriter / cli / engine_bridge / worker exercise
          # under coverage. Without it, response_rewriter coverage was
          # 71% and total was 76-78% (under the 80% gate).
          CFLAGS="-Wno-parentheses" CXXFLAGS="-Wno-parentheses" \
            pip install "vllm>=0.10"

      - name: Lint
        run: |
          ruff check vllm_swift/ tests/
          ruff format --check vllm_swift/ tests/

      - name: Build Swift bridge (debug — needed for engine_bridge dylib-load coverage)
        # Without a real dylib next to vllm_swift._lib, engine_bridge.py
        # short-circuits 46 lines of ctypes dispatch. Pass
        # -strict-concurrency=minimal so the CI Swift toolchain (6.x,
        # stricter than local macOS 26 Swift) doesn't fail on upstream
        # MLXVLM/MediaProcessing.swift's CIContext non-Sendable warnings —
        # those are correctness lints in dependencies, not vllm-swift bugs,
        # and downgrading them only for our build keeps coverage honest.
        run: |
          cd swift && swift build -Xswiftc -strict-concurrency=minimal
          # SPM doesn't compile .metal files. mlx-swift-lm ships a
          # build-metallib.sh that does the metal-compile + metallib-archive
          # dance; invoke it for debug so the metallib lands next to the
          # debug dylib (where tests/test_install.py checks the
          # install-time sibling-pair invariant).
          .build/checkouts/mlx-swift-lm/scripts/build-metallib.sh debug
          DYLIB=$(find .build -name "libVLLMBridge.dylib" -print -quit)
          DYLIB_DIR=$(dirname "$DYLIB")
          mkdir -p ../vllm_swift/_lib
          cp "$DYLIB" ../vllm_swift/_lib/libVLLMBridge.dylib
          METALLIB=$(find .build -name "mlx.metallib" -print -quit)
          cp "$METALLIB" ../vllm_swift/_lib/mlx.metallib
          # Also stage next to the debug dylib so test_install.py finds it.
          [ -f "$DYLIB_DIR/mlx.metallib" ] || cp "$METALLIB" "$DYLIB_DIR/mlx.metallib"

      - name: Run tests
        run: |
          python -m pytest tests/ --cov=vllm_swift --cov-fail-under=80 -v

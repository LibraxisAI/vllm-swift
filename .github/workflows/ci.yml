name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # `aiohttp` covers the longctx proxy path that response_rewriter
          # tests exercise (the v0.5.3 inner-import fix made this no longer
          # mandatory, but installing it in CI lets the proxy code branches
          # actually run under coverage — without it response_rewriter sat at
          # 71% and dragged the total below the 80% gate).
          pip install pytest pytest-cov ruff psutil numpy aiohttp
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Lint
        run: |
          ruff check vllm_swift/ tests/
          ruff format --check vllm_swift/ tests/

      - name: Run tests
        run: |
          python -m pytest tests/ --cov=vllm_swift --cov-fail-under=80 -v
